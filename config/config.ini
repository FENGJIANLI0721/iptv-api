[Settings]
; =========================
; 全局功能开关 / Global Switches
; =========================

# 开启更新，用于控制是否更新接口，若关闭则所有工作模式（获取接口和测速）均停止；可选值: True, False
open_update = True
# 开启未匹配频道分类，source_file 中未匹配的频道会进入该分类并直接写入结果，不参与测速
open_unmatch_category = False
# 开启无结果频道分类，自动归类至底部；可选值: True, False
open_empty_category = False
# 开启显示更新时间；可选值: True, False
open_update_time = True
# 开启显示接口说明信息，控制是否显示接口来源、分辨率、协议类型等信息
open_url_info = False
# 开启 EPG 功能，支持频道显示预告内容；可选值: True, False
open_epg = True
# 开启转换生成 m3u 文件类型结果链接，支持显示频道图标；可选值: True, False
open_m3u_result = True
# 单个频道接口数量
urls_limit = 5
# 更新时间显示位置；可选值: top、bottom
update_time_position = top
# 系统语言设置；可选值: zh_CN、en
language = zh_CN

; =========================
; 定时执行设置 / Scheduled Execution Settings
; =========================

update_mode = interval
update_interval = 24
update_times =
update_startup = True
time_zone = Asia/Shanghai

; =========================
; 结果输出 & 服务配置 / Output & Service
; =========================

source_file = config/demo.txt
final_file = output/result.txt
open_realtime_write = True
open_service = True
app_port = 5180
public_scheme = http
public_domain = 127.0.0.1
cdn_url =
http_proxy =

; =========================
; 数据源总开关 / Source Global Switches
; =========================

open_local = True
open_subscribe = True
open_auto_disable_source = True

; =========================
; 数据源工作模式 / Source Working Modes
; =========================

open_history = True
open_headers = False

; =========================
; 过滤 & 测速设置 / Filtering & Speed Test
; =========================

open_speed_test = True
open_filter_resolution = True
open_filter_speed = True
open_full_speed_test = False
open_supply = False

min_resolution = 1280x720
max_resolution = 3840x2160
min_speed = 0.5
resolution_speed_map = 1280x720:0.2,1920x1080:0.5,3840x2160:1.0

speed_test_limit = 5
speed_test_timeout = 10
speed_test_filter_host = False

request_timeout = 10

; =========================
; 网络协议 & 地域偏好 / Network & Region Preferences
; =========================

ipv6_support = True
ipv_type = all
ipv_type_prefer = auto
location =
isp =

; =========================
; 结果排序偏好 / Result Ordering Preference
; =========================

origin_type_prefer =

; =========================
; 本地源 / Local Source
; =========================

local_num = 10

; =========================
; 订阅源 / Subscription Source
; =========================

subscribe_num = 10

; =========================
; 频道台标 / Channel Logo
; =========================

logo_url = https://live.fanmingming.cn/tv
logo_type = png

; =========================
; RTMP 推流 / RTMP Push
; =========================

open_rtmp = True
nginx_http_port = 8080
nginx_rtmp_port = 1935
rtmp_idle_timeout = 300
rtmp_max_streams = 10
rtmp_transcode_mode = copy
